<svg xmlns="http://www.w3.org/2000/svg" width="200" height="28" viewBox="0 0 200 28">
    <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:0.8" />
    <stop offset="100%" style="stop-color:#7aa2f7;stop-opacity:1" />
    </linearGradient>
    
    
            <linearGradient id="ringgrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff3b3b"/>
            <stop offset="25%" stop-color="#ffe02c"/>
            <stop offset="50%" stop-color="#3bd16f"/>
            <stop offset="75%" stop-color="#2cb6ff"/>
            <stop offset="100%" stop-color="#9a6bff"/>
            </linearGradient>
    
    </defs>

    <rect width="200" height="28" rx="14" fill="#1a1b26"/>
    <rect x="2" y="2" width="196" height="24" rx="12" fill="url(#grad)" opacity="0.1"/>

    
            <g transform="translate(12, 9)">
            <g>
            <circle cx="5" cy="5" r="5.5" fill="none" stroke="url(#ringgrad)" stroke-width="2"
                    stroke-linecap="round" stroke-dasharray="21 12"/>
            <animateTransform attributeName="transform" type="rotate"
                    from="0 5 5" to="360 5 5" dur="2.4s" repeatCount="indefinite"/>
            </g>
            </g>

    <text x="28" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a9b1d6">Profile Views</text>
    
    <text class="" x="185" y="18" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#7aa2f7">1,337</text>
    
    </svg>